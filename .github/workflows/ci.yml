name: CI — Build & Type Check

# Runs on every push to any branch AND on Pull Requests targeting main
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. TypeScript type check — catches type errors before deploy
      - name: Type check
        run: npx tsc --noEmit
        env:
          # Provide dummy env vars so Next.js config doesn't crash during type check
          NEXTAUTH_SECRET: dummy
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
          SUPABASE_URL: https://dummy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: dummy
          RESEND_API_KEY: re_123456789
          UPSTASH_REDIS_REST_URL: https://dummy.upstash.io
          UPSTASH_REDIS_REST_TOKEN: dummy
          VAPID_SUBJECT: mailto:test@example.com
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: dummy
          VAPID_PRIVATE_KEY: dummy

      # 5. Build — makes sure production build doesn't break
      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: dummy
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
          SUPABASE_URL: https://dummy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: dummy
          RESEND_API_KEY: re_123456789
          UPSTASH_REDIS_REST_URL: https://dummy.upstash.io
          UPSTASH_REDIS_REST_TOKEN: dummy
          VAPID_SUBJECT: mailto:test@example.com
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: dummy
          VAPID_PRIVATE_KEY: dummy
          # Skip Razorpay/QStash/email keys — they're not needed for build
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          QSTASH_TOKEN: dummy
          QSTASH_URL: https://qstash.upstash.io
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
